name: happyco
description: Wood furniture manufacturing app
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

   # Dependency Injection
  get_it: ^8.0.0
  injectable: ^2.4.4

   # State Management
  flutter_bloc: ^8.1.6
  auto_route: ^9.0.0+1

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.5.0+1
  dio_smart_retry: ^7.0.0

  # Utilities
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.3
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  video_player: ^2.9.1
  chewie: ^1.8.5

  # Logging
  talker_flutter: ^4.4.1
  talker_bloc_logger: ^4.4.1
  talker_dio_logger: ^4.4.1

  # Functional Programming
  fpdart: ^1.1.0

  # Environment
  flutter_dotenv: ^5.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  auto_route_generator: ^9.0.0

  # App Icon & Splash Screen
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/
    - .env
    - .env.development
    - .env.production

  fonts:
    - family: SVN-Gilroy
      fonts:
        - asset: assets/fonts/SVN-Gilroy-Regular.otf
          weight: 400
        - asset: assets/fonts/SVN-Gilroy-Medium.otf
          weight: 500
        - asset: assets/fonts/SVN-Gilroy-SemiBold.otf
          weight: 600
        - asset: assets/fonts/SVN-Gilroy-Bold.otf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android: true
  ios: true

  android_12:
    color: "#FFFFFF"
    image: assets/images/logo.png

  ios_content_mode: center
