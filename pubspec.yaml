name: happyco
description: Wood furniture manufacturing app
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Dependency Injection
  get_it: ^8.0.0
  injectable: ^2.4.4

  # State Management
  flutter_bloc: ^8.1.6

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.5.0+1

  # Routing
  auto_route: ^9.2.0

  # UI & Responsive
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10+1

  # Storage
  shared_preferences: ^2.3.2

  # Firebase (if needed - optional)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Utilities
  shimmer: ^3.0.0

  # Logging
  talker_flutter: ^4.4.1
  talker_bloc_logger: ^4.4.1
  talker_dio_logger: ^4.4.1

  # Functional Programming
  fpdart: ^1.1.0

  # Environment
  flutter_dotenv: ^5.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  auto_route_generator: ^9.0.0
  talker_flutter: ^4.4.1
  talker_dio_logger: ^4.1.0
  talker_bloc_logger: ^4.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/
    - .env
    - .env.development
    - .env.staging
    - .env.production

  fonts:
    - family: SVN-Gilroy
      fonts:
        - asset: assets/fonts/SVN-Gilroy-Regular.otf
          weight: 400
        - asset: assets/fonts/SVN-Gilroy-Medium.otf
          weight: 500
        - asset: assets/fonts/SVN-Gilroy-SemiBold.otf
          weight: 600
        - asset: assets/fonts/SVN-Gilroy-Bold.otf
          weight: 700
